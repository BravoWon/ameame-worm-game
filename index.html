<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>The Endless Bloom — Ameame</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#0b1026;touch-action:none;
    font-family:'Comic Sans MS','Baloo 2','Segoe UI',system-ui,cursive,sans-serif;}
  canvas{display:block;}
#sky{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,#ffd9f4 0%,#e3d9ff 30%,#d6ecff 60%,#d9ffe3 100%);}
#debug{position:fixed;left:8px;bottom:8px;z-index:20;max-width:92vw;color:#ffec8a;font:12px/1.3 monospace;background:rgba(0,0,0,.55);padding:5px 9px;border-radius:6px;white-space:pre-wrap;display:none;}
#vignette{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(ellipse at 50% 42%, transparent 52%, rgba(18,4,38,.5) 100%);}
.hud{position:fixed;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.4);user-select:none;z-index:5;}
#meter{top:14px;left:16px;width:200px;height:16px;border-radius:10px;background:rgba(255,255,255,.25);overflow:hidden;}
#meterFill{height:100%;width:0%;background:linear-gradient(90deg,#ffd1f0,#fff0a6);transition:width .2s;}
#mute{top:12px;right:14px;background:rgba(255,255,255,.3);border:none;border-radius:20px;padding:8px 14px;font-size:15px;cursor:pointer;color:#fff;}
#touch{position:fixed;inset:auto 0 0 0;height:32%;display:flex;justify-content:space-between;align-items:flex-end;padding:0 18px 24px;pointer-events:none;z-index:4;}
.tbtn{pointer-events:auto;width:84px;height:84px;border-radius:50%;border:none;font-size:36px;background:rgba(255,255,255,.3);color:#fff;}
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle at 50% 40%, rgba(60,30,80,.5), rgba(10,12,38,.85));}
#overlay h1{font-size:min(12vw,64px);color:#ffd1f0;text-shadow:0 0 24px #ff8fd0;margin:0;}
#overlay .jp{color:#bfe; font-size:24px;margin:8px;}
#start{margin-top:18px;font-size:26px;padding:16px 46px;border:none;border-radius:32px;background:linear-gradient(180deg,#ffd66e,#ffac4d);color:#7a3b00;cursor:pointer;}
</style></head>
<body>
<div id="sky"></div>
<div id="debug"></div>
<div id="vignette"></div>
<div id="meter" class="hud"><div id="meterFill"></div></div>
<button id="mute" class="hud">🔊</button>
<div id="touch"><button class="tbtn" id="bl">◀</button><button class="tbtn" id="br">▶</button></div>
<div id="overlay"><h1>The Endless Bloom</h1><div class="jp">あめあめの えんどれす ぶるーむ</div>
<p style="color:#fff;max-width:520px">Steer with ← → (or A D, or the big buttons), graze the glowing motes, and fill the bloom… ✨</p>
<button id="start">▶ Begin, Ameame</button></div>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
  "use strict";
  var Bloom = (window.Bloom = { VERSION: "0.2.0-cinematic" });
  var hasTHREE = (typeof THREE !== 'undefined');
  function showDebug(m){ try{ var d=document.getElementById('debug'); if(d){ d.style.display='block'; d.textContent='⚠ '+String(m); } }catch(e){} }
  Bloom._dbg = showDebug;
  try{ window.addEventListener('error', function(ev){ showDebug((ev&&ev.message)||'script error'); }); }catch(e){}
  if (!hasTHREE){ try{ var _h=document.querySelector('#overlay h1'); if(_h) _h.textContent='Needs internet 🌸'; var _p=document.querySelector('#overlay p'); if(_p) _p.textContent='This game loads its 3D engine from the web the first time — please connect and reopen me.'; }catch(e){} }

  /* ===== MODULE: self ===== */
  var TRAIT_OF = { petal:'frill', dewdrop:'glow', pollen:'sparkle', seedling:'leaf',
                   grass:'leaf', firefly:'glow', star:'starry', bubble:'bubbly', stone:'plate' };
  var HUE_OF   = { petal:0.97, dewdrop:0.55, pollen:0.13, seedling:0.33,
                   grass:0.30, firefly:0.15, star:0.62, bubble:0.50, stone:0.08 };
  var Self = Bloom.self = {
    create: function(){ return { hueBias:0.92, parts:[], auraColor:0xfff0a6, traits:[] }; },
    applyGraze: function(s, family){
      var targetHue = (family in HUE_OF) ? HUE_OF[family] : s.hueBias;
      s.hueBias = s.hueBias + (targetHue - s.hueBias) * 0.12;        // drift toward diet
      var trait = TRAIT_OF[family];
      if (trait && s.traits.indexOf(trait) < 0){ s.traits.push(trait); s.parts.push(trait); }
    },
    save: function(s){ try{ window.localStorage.setItem('bloom_self', JSON.stringify(s)); }catch(e){} },
    load: function(){
      try{ var raw=window.localStorage.getItem('bloom_self'); if(raw){ var o=JSON.parse(raw);
        return { hueBias:+o.hueBias||0.92, parts:o.parts||[], auraColor:o.auraColor||0xfff0a6, traits:o.traits||[] }; } }catch(e){}
      return Self.create();
    },
    TRAIT_OF: TRAIT_OF
  };
  /* ===== END self ===== */
  /* ===== MODULE: tiers ===== */
  var TIERS = [
    { id:'flowerbud', name:'Flowerbud', palette:{sky:0xffe1f0, ground:0xffc7e2, accent:0xff8fc7},
      grazableFamilies:[{name:'petal',color:0xff8fc7,trait:'frill'},{name:'dewdrop',color:0xbfeaff,trait:'glow'},{name:'pollen',color:0xffe07a,trait:'sparkle'}],
      creatures:'firefly', decor:'petals', musicLayer:0, nextTierProp:'flower' },
    { id:'garden', name:'Garden', palette:{sky:0xd9ecff, ground:0xc6f0cf, accent:0xff7ab8},
      grazableFamilies:[{name:'petal',color:0xff7ab8,trait:'frill'},{name:'seedling',color:0x8fd3a8,trait:'leaf'},{name:'dewdrop',color:0xbfeaff,trait:'glow'}],
      creatures:'butterfly', decor:'flowers', musicLayer:1, nextTierProp:'garden' },
    { id:'meadow', name:'Meadow', palette:{sky:0xcfe9ff, ground:0xbfe8a8, accent:0xffd166},
      grazableFamilies:[{name:'grass',color:0x9be38f,trait:'leaf'},{name:'pollen',color:0xffe07a,trait:'sparkle'},{name:'firefly',color:0xfff2a6,trait:'glow'}],
      creatures:'bird', decor:'meadow', musicLayer:2, nextTierProp:'meadow' }
  ];
  Bloom.tiers = {
    LIST: TIERS,
    get: function(i){ return TIERS[((i%TIERS.length)+TIERS.length)%TIERS.length]; },
    next: function(i){ return (i+1) % TIERS.length; }   // slice: loop; later: fractal def
  };
  /* ===== END tiers ===== */
  /* ===== MODULE: state ===== */
  Bloom.state = {
    create: function(){ return { tierIndex:0, wonder:0, phase:'title', self: Bloom.self.load() }; },
    graze: function(st, amount){
      if (st.phase !== 'playing') return;
      st.wonder = Math.min(1, st.wonder + (amount||0.1));
      if (st.wonder >= 1) st.phase = 'blooming';
    },
    advanceTier: function(st){
      st.tierIndex = Bloom.tiers.next(st.tierIndex);
      st.wonder = 0; st.phase = 'playing';
      Bloom.self.save(st.self);
    }
  };
  /* ===== END state ===== */
  /* ===== MODULE: worm ===== */
  var SPEED=0.34, TURN_ACCEL=0.012, TURN_MAX=0.06, TURN_DAMP=0.86;
  Bloom.worm = {
    create: function(){ return { x:0, z:0, heading:0, turnVel:0, path:[{x:0,z:0}], segments:4 }; },
    step: function(w, turnInput, speed){
      w.turnVel = (w.turnVel + (turnInput||0)*TURN_ACCEL) * TURN_DAMP;
      if (w.turnVel >  TURN_MAX) w.turnVel =  TURN_MAX;
      if (w.turnVel < -TURN_MAX) w.turnVel = -TURN_MAX;
      w.heading += w.turnVel;
      var s = (speed==null?SPEED:speed);
      w.x += Math.cos(w.heading)*s; w.z += Math.sin(w.heading)*s;
      w.path.unshift({x:w.x, z:w.z});
      var need = (w.segments+2)*6 + 6; while (w.path.length>need) w.path.pop();
    },
    grow: function(w){ w.segments++; },
    reset: function(w){ w.x=0; w.z=0; w.heading=0; w.turnVel=0; w.path=[{x:0,z:0}]; }
  };
  /* ===== END worm ===== */
  /* ===== MODULE: input ===== */
  Bloom._win = window;
  var _turn = 0, _installed = false;
  var LEFT = ['ArrowLeft','a','A'], RIGHT = ['ArrowRight','d','D'];
  Bloom.input = {
    install: function(){
      if (_installed) return; _installed = true;
      window.addEventListener('keydown', function(e){ if(LEFT.indexOf(e.key)>=0)_turn=1; else if(RIGHT.indexOf(e.key)>=0)_turn=-1; });
      window.addEventListener('keyup',   function(e){ if(LEFT.indexOf(e.key)>=0||RIGHT.indexOf(e.key)>=0)_turn=0; });
    },
    get: function(){ return _turn; },
    set: function(v){ _turn = v; }
  };
  /* ===== END input ===== */
  /* ===== MODULE: grazables ===== */
  var motes = [], COUNT = 14, _tier = null;
  function placeNear(g){
    var bx = (Bloom.worm._w? Bloom.worm._w.x:0)*0.6, bz=(Bloom.worm._w? Bloom.worm._w.z:0)*0.6;
    var a = Math.random()*6.283, d = 12 + Math.random()*26;
    g.x = bx + Math.cos(a)*d; g.z = bz + Math.sin(a)*d;
    try{ if(g.mesh) g.mesh.position.set(g.x, 1.0, g.z); }catch(e){}
  }
  function makeMesh(color){
    try{ if(typeof THREE==='undefined') return null;
      var grp=new THREE.Group();
      var core=new THREE.Mesh(new THREE.SphereGeometry(0.5,16,16), new THREE.MeshStandardMaterial({color:color,emissive:color,emissiveIntensity:0.95,roughness:0.25}));
      grp.add(core); grp._core=core;
      var glow=Bloom.fx.makeGlow(color,4.4); if(glow){ grp.add(glow); grp._glow=glow; }
      Bloom._engine.scene && Bloom._engine.scene.add(grp); return grp; }catch(e){ return null; }
  }
  Bloom.grazables = {
    reset: function(tier){
      _tier = tier;
      motes.forEach(function(g){ try{ g.mesh && Bloom._engine.scene && Bloom._engine.scene.remove(g.mesh); }catch(e){} });
      motes = [];
      for (var i=0;i<COUNT;i++){
        var fam = tier.grazableFamilies[i % tier.grazableFamilies.length];
        var g = { x:0, z:0, family:fam.name, color:fam.color, mesh:null };
        placeNear(g); g.mesh = makeMesh(fam.color);
        try{ if(g.mesh) g.mesh.position.set(g.x, 1.0, g.z); }catch(e){}
        motes.push(g);
      }
    },
    list: function(){ return motes; },
    step: function(t){ try{ for(var i=0;i<motes.length;i++){ var g=motes[i]; if(!g.mesh) continue;
        var pulse=1+Math.sin(t*0.07+i*1.3)*0.2; g.mesh.position.set(g.x, 1.05+Math.sin(t*0.045+i)*0.3, g.z);
        if(g.mesh._glow&&g.mesh._glow.scale) g.mesh._glow.scale.set(4.4*pulse,4.4*pulse,1);
        if(g.mesh._core&&g.mesh._core.scale) g.mesh._core.scale.setScalar(pulse); } }catch(e){} },
    colorOf: function(fam){ for(var i=0;i<motes.length;i++){ if(motes[i].family===fam) return motes[i].color; } return 0xffffff; },
    checkEat: function(hx, hz, r){
      for (var i=0;i<motes.length;i++){
        var g = motes[i], dx=hx-g.x, dz=hz-g.z;
        if (dx*dx+dz*dz < r*r){ var fam=g.family; Bloom.grazables._lastColor=g.color; placeNear(g); return fam; }
      }
      return null;
    }
  };
  /* ===== END grazables ===== */
  /* ===== MODULE: bloom ===== */
  var _bt = 0, DUR = 90, SWAP = 0.5, _swapped = false, _active = false;
  Bloom.bloom = {
    begin: function(st){ _bt = 0; _swapped = false; _active = true; st.phase = 'blooming'; },
    active: function(){ return _active; },
    progress: function(){ return _bt / DUR; },
    update: function(st, w){
      _bt++;
      var p = _bt / DUR;
      // visual: pull camera back as p rises (guarded; no-op under tests)
      try{ var cam=Bloom._engine.camera; if(cam) cam.position.lerp(new THREE.Vector3(w.x,28+p*120,w.z+32+p*120),0.2); }catch(e){}
      try{ Bloom.world.shrink(p / SWAP); }catch(e){}
      if (!_swapped && p >= SWAP){
        _swapped = true;
        Bloom.state.advanceTier(st);                 // tier++, wonder=0, save self
        Bloom.worm.reset(w);                          // small again, keep segments
        var nt = Bloom.tiers.get(st.tierIndex);
        try{ Bloom.world && Bloom.world.build(nt); }catch(e){}
        try{ Bloom.grazables.reset(nt); }catch(e){}
        try{ Bloom.audio.setLayer(st.tierIndex); }catch(e){}
      }
      if (p >= 1){ st.phase = 'playing'; _active = false; }
    }
  };
  /* ===== END bloom ===== */
  /* ===== MODULE: world ===== */
  var _group=null, _creatures=[], _ground=null;
  function disposeGroup(){ try{ if(_group && Bloom._engine && Bloom._engine.scene) Bloom._engine.scene.remove(_group); }catch(e){} _group=null; }
  Bloom.world = {
    shrink: function(p){ try{ if(_group) _group.scale.setScalar(Math.max(0.001, 1-p)); }catch(e){} },
    build: function(tier){
      disposeGroup(); _creatures = [];
      // reactive creatures (state is plain; mesh guarded)
      var n = 6;
      for (var i=0;i<n;i++){
        var a=Math.random()*6.283, d=10+Math.random()*30;
        var c = { x:Math.cos(a)*d, z:Math.sin(a)*d, mesh:null };
        _creatures.push(c);
      }
      try{
        if (typeof THREE==='undefined') return;
        _group = new THREE.Group(); if(Bloom._engine && Bloom._engine.scene) Bloom._engine.scene.add(_group);
        // ground + lights tinted by palette
        if (Bloom._engine && Bloom._engine.scene){ Bloom._engine.scene.fog = new THREE.Fog(tier.palette.sky, 60, 240); }
        var ground = new THREE.Mesh(new THREE.CircleGeometry(340,64), new THREE.MeshStandardMaterial({color:tier.palette.ground, roughness:0.85, emissive:tier.palette.ground, emissiveIntensity:0.12}));
        ground.rotation.x = -Math.PI/2; _group.add(ground); _ground=ground;
        _group.add(new THREE.HemisphereLight(0xffffff, tier.palette.ground, 1.0));
        var dir=new THREE.DirectionalLight(0xffffff,0.7); dir.position.set(20,40,15); _group.add(dir);
        for (var j=0;j<_creatures.length;j++){
          var m=new THREE.Mesh(new THREE.SphereGeometry(0.8,14,14), new THREE.MeshStandardMaterial({color:tier.palette.accent, emissive:tier.palette.accent, emissiveIntensity:0.5, roughness:0.4}));
          _creatures[j].mesh=m; _group.add(m);
          try{ var cg=Bloom.fx.makeGlow(tier.palette.accent,3.0); if(cg) m.add(cg); }catch(e){}
        }
      }catch(e){}
      try{ Bloom.fx.buildDome(tier); }catch(e){}
      try{ Bloom.fx.buildField(tier.palette.accent); }catch(e){}
      try{ Bloom.fx.buildLights(tier); }catch(e){}
    },
    creatures: function(){ return _creatures; },
    follow: function(x,z){ try{ if(_ground) _ground.position.set(x,0,z); }catch(e){} },
    stepCreatures: function(hx, hz){
      for (var i=0;i<_creatures.length;i++){
        var c=_creatures[i]; c.x += (hx-c.x)*0.01; c.z += (hz-c.z)*0.01;
        try{ if(c.mesh) c.mesh.position.set(c.x, 1.2+Math.sin(i)*0.3, c.z); }catch(e){}
      }
    }
  };
  /* ===== END world ===== */
  /* ===== MODULE: fx ===== */
  var _glowTex=null;
  function _canvasTex(draw){
    try{ var c=document.createElement('canvas'); c.width=128; c.height=128;
      var ctx=c.getContext('2d'); if(!ctx) return null;
      draw(ctx,128); return new THREE.CanvasTexture(c);
    }catch(e){ return null; }
  }
  function glowTexture(){
    if(_glowTex) return _glowTex;
    _glowTex=_canvasTex(function(ctx,s){
      var g=ctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
      g.addColorStop(0,'rgba(255,255,255,1)'); g.addColorStop(0.25,'rgba(255,255,255,0.82)');
      g.addColorStop(0.6,'rgba(255,255,255,0.22)'); g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
    });
    return _glowTex;
  }
  function makeGlow(color,size){
    try{ var tex=glowTexture(); if(!tex) return null;
      var mat=new THREE.SpriteMaterial({ map:tex, color:color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.9 });
      var sp=new THREE.Sprite(mat); sp.scale.set(size,size,1); return sp;
    }catch(e){ return null; }
  }
  var _field=null;
  function buildField(color){
    try{ if(_field&&Bloom._engine.scene){ Bloom._engine.scene.remove(_field.pts); } _field=null;
      var N=440, pos=new Float32Array(N*3), spd=new Float32Array(N);
      for(var i=0;i<N;i++){ pos[i*3]=(Math.random()-0.5)*280; pos[i*3+1]=Math.random()*100; pos[i*3+2]=(Math.random()-0.5)*280; spd[i]=0.15+Math.random()*0.5; }
      var geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
      var mat=new THREE.PointsMaterial({ size:1.6, map:glowTexture(), color:color, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.75, sizeAttenuation:true });
      var pts=new THREE.Points(geo,mat); if(Bloom._engine.scene) Bloom._engine.scene.add(pts);
      _field={ pts:pts, pos:pos, spd:spd, N:N, geo:geo };
    }catch(e){}
  }
  function stepField(){
    try{ if(!_field) return; var p=_field.pos, s=_field.spd, N=_field.N;
      for(var i=0;i<N;i++){ p[i*3+1]+=s[i]*0.12; if(p[i*3+1]>100) p[i*3+1]=0; }
      if(_field.geo.attributes&&_field.geo.attributes.position) _field.geo.attributes.position.needsUpdate=true;
    }catch(e){}
  }
  var _dome=null;
  function buildDome(tier){
    try{ if(_dome&&Bloom._engine.scene){ Bloom._engine.scene.remove(_dome); } _dome=null;
      var sky=new THREE.Color(tier.palette.sky), grd=new THREE.Color(tier.palette.ground);
      var topHex='#'+sky.getHexString();
      var midHex='#'+sky.clone().lerp(new THREE.Color(0xffffff),0.45).getHexString();
      var botHex='#'+grd.clone().lerp(new THREE.Color(0xffffff),0.55).getHexString();
      var tex=_canvasTex(function(ctx,s){ var g=ctx.createLinearGradient(0,0,0,s);
        g.addColorStop(0,topHex); g.addColorStop(0.55,midHex); g.addColorStop(1,botHex);
        ctx.fillStyle=g; ctx.fillRect(0,0,s,s); });
      var mat=new THREE.MeshBasicMaterial({ map:tex, side:THREE.BackSide, depthWrite:false, fog:false });
      var dome=new THREE.Mesh(new THREE.SphereGeometry(600,32,16), mat);
      if(Bloom._engine.scene) Bloom._engine.scene.add(dome); _dome=dome;
    }catch(e){}
  }
  var _plights=[];
  function buildLights(tier){
    try{ for(var k=0;k<_plights.length;k++){ try{ Bloom._engine.scene&&Bloom._engine.scene.remove(_plights[k].light); }catch(e){} } _plights=[];
      if(!Bloom._engine.scene) return;
      var cols=[tier.palette.accent, tier.palette.sky];
      for(var i=0;i<2;i++){ var L=new THREE.PointLight(cols[i],0.7,220); L.position.set(0,30,0); Bloom._engine.scene.add(L); _plights.push({light:L, ph:i*3.1}); }
    }catch(e){}
  }
  function stepLights(t,cx,cz){
    try{ for(var i=0;i<_plights.length;i++){ var P=_plights[i], a=t*0.008+P.ph;
      P.light.position.set(cx+Math.cos(a)*45, 24+Math.sin(a*0.7)*10, cz+Math.sin(a)*45); } }catch(e){}
  }
  var _bursts=[];
  function spawnBurst(x,y,z,color){
    try{ var N=16, pos=new Float32Array(N*3), vel=[];
      for(var i=0;i<N;i++){ pos[i*3]=x; pos[i*3+1]=y; pos[i*3+2]=z; var a=Math.random()*6.283;
        vel.push([Math.cos(a)*(0.25+Math.random()*0.5), 0.35+Math.random()*0.6, Math.sin(a)*(0.25+Math.random()*0.5)]); }
      var geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
      var mat=new THREE.PointsMaterial({ size:2.6, map:glowTexture(), color:color||0xffffff, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:1 });
      var pts=new THREE.Points(geo,mat); if(Bloom._engine.scene) Bloom._engine.scene.add(pts);
      _bursts.push({ pts:pts, pos:pos, vel:vel, geo:geo, mat:mat, life:1, N:N });
    }catch(e){}
  }
  function stepBursts(){
    try{ for(var b=_bursts.length-1;b>=0;b--){ var B=_bursts[b]; B.life-=0.045;
        for(var i=0;i<B.N;i++){ B.pos[i*3]+=B.vel[i][0]; B.pos[i*3+1]+=B.vel[i][1]-(1-B.life)*0.3; B.pos[i*3+2]+=B.vel[i][2]; }
        if(B.geo.attributes&&B.geo.attributes.position) B.geo.attributes.position.needsUpdate=true;
        if(B.mat) B.mat.opacity=Math.max(0,B.life);
        if(B.life<=0){ try{ Bloom._engine.scene&&Bloom._engine.scene.remove(B.pts); }catch(e){} _bursts.splice(b,1); }
      } }catch(e){}
  }
  var _trail=null;
  function ensureTrail(){
    try{ if(_trail) return _trail; var N=46, pos=new Float32Array(N*3);
      var geo=new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
      var mat=new THREE.PointsMaterial({ size:3.0, map:glowTexture(), color:0xffd1f0, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.6, sizeAttenuation:true });
      var pts=new THREE.Points(geo,mat); if(Bloom._engine.scene) Bloom._engine.scene.add(pts);
      _trail={ pts:pts, pos:pos, geo:geo, mat:mat, N:N }; return _trail;
    }catch(e){ return null; }
  }
  function stepTrail(W,hue){
    try{ var T=ensureTrail(); if(!T) return; var N=T.N, path=W.path;
      for(var i=0;i<N;i++){ var pi=Math.min(i*2+2, path.length-1); var p=path[pi]||path[path.length-1]||{x:W.x,z:W.z};
        T.pos[i*3]=p.x; T.pos[i*3+1]=1.3; T.pos[i*3+2]=p.z; }
      if(T.geo.attributes&&T.geo.attributes.position) T.geo.attributes.position.needsUpdate=true;
      if(T.mat&&T.mat.color&&T.mat.color.setHSL) T.mat.color.setHSL(((hue+0.5)%1+1)%1,0.85,0.7);
    }catch(e){}
  }
  function stepAmbient(t,cx,cz){
    stepField();
    try{ if(_field&&_field.pts) _field.pts.position.set(cx,0,cz); }catch(e){}
    try{ if(_dome) _dome.position.set(cx,0,cz); }catch(e){}
    stepLights(t,cx,cz); stepBursts();
  }
  Bloom.fx = { glowTexture:glowTexture, makeGlow:makeGlow, buildField:buildField, buildDome:buildDome,
    buildLights:buildLights, spawnBurst:spawnBurst, stepTrail:stepTrail, stepAmbient:stepAmbient };
  /* ===== END fx ===== */
  /* ===== MODULE: audio ===== */
  var _ac=null, _muted=false, _pad=null, _padGain=null, _padBase=110;
  function tone(freq,dur,type,vol,delay){ if(!_ac||_muted) return; try{
    var o=_ac.createOscillator(), g=_ac.createGain(); o.type=type||'sine'; o.frequency.value=freq;
    o.connect(g); g.connect(_ac.destination); var t=_ac.currentTime+(delay||0);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(dur||0.25)); o.start(t); o.stop(t+(dur||0.3)+0.05); }catch(e){} }
  function startPad(){ if(!_ac||_pad) return; try{
    _pad=_ac.createOscillator(); _padGain=_ac.createGain(); _pad.type='sine'; _pad.frequency.value=_padBase;
    var sub=_ac.createOscillator(), sg=_ac.createGain(); sub.type='sine'; sub.frequency.value=_padBase*1.5; sg.gain.value=0.5;
    var lfo=_ac.createOscillator(), lg=_ac.createGain(); lfo.frequency.value=0.07; lg.gain.value=0.012;
    lfo.connect(lg); lg.connect(_padGain.gain);
    _pad.connect(_padGain); sub.connect(sg); sg.connect(_padGain); _padGain.connect(_ac.destination);
    _padGain.gain.value=_muted?0:0.025; _pad.start(); sub.start(); lfo.start();
  }catch(e){} }
  Bloom.audio = {
    start: function(){ try{ if(!_ac) _ac=new (window.AudioContext||window.webkitAudioContext)(); startPad(); }catch(e){} },
    layersFor: function(ti){ return Math.min(3, (ti|0)+1); },
    setLayer: function(ti){ try{ _padBase=88*Math.pow(1.12,(ti|0)); if(_pad&&_pad.frequency){ _pad.frequency.value=_padBase; } }catch(e){} },
    setMuted: function(b){ _muted=!!b; try{ if(_padGain&&_padGain.gain) _padGain.gain.value=_muted?0:0.025; }catch(e){} },
    isMuted: function(){ return _muted; },
    sfx: function(name){ try{
      if(name==='graze'){ var base=540+Math.random()*30; [0,4,7].forEach(function(s,i){ tone(base*Math.pow(2,s/12),0.22,'triangle',0.10,i*0.05); }); tone(base*2,0.3,'sine',0.05,0.02); }
      else if(name==='bloom'){ [0,4,7,12,16,19].forEach(function(s,i){ tone(523.25*Math.pow(2,s/12),0.7,'sine',0.09,i*0.11); }); }
    }catch(e){} }
  };
  /* ===== END audio ===== */
  /* ===== MODULE: ui ===== */
  Bloom.ui = {
    install: function(){
      if (Bloom._uiInstalled) return; Bloom._uiInstalled = true;
      var d=window.document;
      var startBtn=d.getElementById('start'); if(startBtn) startBtn.addEventListener('click', function(){ Bloom.startGame(); });
      var mute=d.getElementById('mute'); if(mute) mute.addEventListener('click', function(){ var m=!Bloom.audio.isMuted(); Bloom.audio.setMuted(m); mute.textContent=m?'🔇':'🔊'; });
      var bl=d.getElementById('bl'), br=d.getElementById('br');
      if(bl){ bl.addEventListener('mousedown',function(){Bloom.input.set(1);}); bl.addEventListener('touchstart',function(e){e.preventDefault&&e.preventDefault();Bloom.input.set(1);}); bl.addEventListener('mouseup',function(){Bloom.input.set(0);}); bl.addEventListener('touchend',function(){Bloom.input.set(0);}); }
      if(br){ br.addEventListener('mousedown',function(){Bloom.input.set(-1);}); br.addEventListener('touchstart',function(e){e.preventDefault&&e.preventDefault();Bloom.input.set(-1);}); br.addEventListener('mouseup',function(){Bloom.input.set(0);}); br.addEventListener('touchend',function(){Bloom.input.set(0);}); }
    },
    setWonder: function(v){ var f=window.document.getElementById('meterFill'); if(f) f.style.width = Math.round(Math.max(0,Math.min(1,v))*100)+'%'; },
    hideTitle: function(){ var o=window.document.getElementById('overlay'); if(o) o.style.display='none'; },
    showTitle: function(){ var o=window.document.getElementById('overlay'); if(o) o.style.display='flex'; }
  };
  /* ===== END ui ===== */

  // ---- engine (guarded) ----
  var renderer=null, scene=null, camera=null;
  try {
    if (hasTHREE) {
      renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);
      scene = new THREE.Scene();
      scene.add(new THREE.HemisphereLight(0xffffff, 0xffd6f2, 1.0));
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));
      camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 2000);
      camera.position.set(0, 28, 34);
    } else { showDebug('THREE failed to load (CDN blocked?)'); }
  } catch(e){ showDebug('engine: '+((e&&e.message)||e)); }
  Bloom._engine = { get renderer(){return renderer;}, get scene(){return scene;}, get camera(){return camera;} };

  /* ===== MODULE: loop ===== */
  Bloom._win = window;
  var ST = (Bloom.live = Bloom.state.create());   // the ONE live game-state instance (distinct from the pure Bloom.state API)
  var W  = Bloom.worm.create(); Bloom.worm._w = W;

  // ---- worm render state (module-scope, lazy) ----
  var _wr = {
    headGroup: null,
    headSphere: null,
    bodyPool: [],    // array of segment meshes, grown lazily
    t: 0            // frame counter
  };

  function _buildHead(E){
    try{
      if (!E.scene) return;
      var g = new THREE.Group();
      // head sphere
      var hSph = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffd1f0, roughness: 0.5 })
      );
      g.add(hSph);
      _wr.headSphere = hSph;
      // eyes
      var eyeGeo = new THREE.SphereGeometry(0.22, 8, 8);
      var eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
      var pupilGeo = new THREE.SphereGeometry(0.12, 8, 8);
      var pupilMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
      var shineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 1 });
      [-0.38, 0.38].forEach(function(ex){
        var eye = new THREE.Mesh(eyeGeo, eyeMat); eye.position.set(ex, 0.28, 0.8); g.add(eye);
        var pupil = new THREE.Mesh(pupilGeo, pupilMat); pupil.position.set(ex, 0.28, 0.95); g.add(pupil);
        var shine = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 6), shineMat); shine.position.set(ex+0.07, 0.36, 0.98); g.add(shine);
      });
      // cheeks
      var cheekMat = new THREE.MeshStandardMaterial({ color: 0xff9abb, transparent: true, opacity: 0.7 });
      [-0.62, 0.62].forEach(function(cx){
        var ch = new THREE.Mesh(new THREE.SphereGeometry(0.18, 8, 8), cheekMat); ch.position.set(cx, 0.04, 0.82); g.add(ch);
      });
      // antennae
      var antMat = new THREE.MeshStandardMaterial({ color: 0xffd1f0 });
      var tipMat = new THREE.MeshStandardMaterial({ color: 0xffecff, emissive: 0xffccff, emissiveIntensity: 0.8 });
      [-0.3, 0.3].forEach(function(ax){
        var cyl = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.7, 6), antMat);
        cyl.position.set(ax, 1.1, 0.3); cyl.rotation.z = ax > 0 ? 0.4 : -0.4; g.add(cyl);
        var tip = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), tipMat);
        tip.position.set(ax * 1.2, 1.55, 0.22); g.add(tip);
      });
      try{ var hg=Bloom.fx.makeGlow(0xffd1f0, 7.0); if(hg){ hg.position.set(0,0.35,0); g.add(hg); _wr.headGlow=hg; } }catch(e){}
      E.scene.add(g);
      _wr.headGroup = g;
    }catch(e){}
  }

  function _ensureBodySeg(E, idx){
    try{
      if (!E.scene) return;
      if (_wr.bodyPool.length <= idx){
        while (_wr.bodyPool.length <= idx){
          var seg = new THREE.Mesh(
            new THREE.SphereGeometry(0.8, 14, 14),
            new THREE.MeshStandardMaterial({ color: 0xffd1f0, emissive: 0xffd1f0, emissiveIntensity: 0.35, roughness: 0.4 })
          );
          E.scene.add(seg);
          try{ var sg=Bloom.fx.makeGlow(0xffd1f0, 3.6); if(sg){ E.scene.add(sg); seg._glow=sg; } }catch(e){}
          _wr.bodyPool.push(seg);
        }
      }
    }catch(e){}
  }

  function _renderWorm(E, W, ST, t){
    try{
      if (!E.scene) return;
      // head color from self
      var hue = (ST.self && typeof ST.self.hueBias === 'number') ? ST.self.hueBias : 0.92;
      var headColor = new THREE.Color().setHSL(hue, 0.7, 0.7);
      if (!_wr.headGroup) _buildHead(E);
      if (_wr.headGroup){
        _wr.headGroup.position.set(W.x, 1.5 + Math.sin(t * 0.15) * 0.12, W.z);
        _wr.headGroup.rotation.y = Math.PI / 2 - W.heading;
        var pop = _wr.pop||0; if(_wr.pop) _wr.pop=Math.max(0,_wr.pop-0.06);
        var hsc=1+pop*0.35; _wr.headGroup.scale.set(hsc, 1/(1+pop*0.2), hsc);
        if (_wr.headGlow){ if(_wr.headGlow.material&&_wr.headGlow.material.color) _wr.headGlow.material.color.copy(headColor);
          var ggs=7.0*(1+pop*0.5); _wr.headGlow.scale.set(ggs,ggs,1); }
        if (_wr.headSphere) _wr.headSphere.material.color.copy(headColor);
        // leaf sprout if trait present
        try{
          var hasLeaf = ST.self && ST.self.traits && ST.self.traits.indexOf('leaf') >= 0;
          // tag the group so we only add the sprout once
          if (hasLeaf && !_wr.headGroup._sprout){
            var sprout = new THREE.Mesh(
              new THREE.ConeGeometry(0.15, 0.45, 6),
              new THREE.MeshStandardMaterial({ color: 0x44cc44, emissive: 0x226622, emissiveIntensity: 0.4 })
            );
            sprout.position.set(0, 1.3, 0); _wr.headGroup.add(sprout);
            _wr.headGroup._sprout = sprout;
          }
          // boost emissive if starry or glow trait
          var hasGlow = ST.self && ST.self.traits && (ST.self.traits.indexOf('starry') >= 0 || ST.self.traits.indexOf('glow') >= 0);
          if (_wr.headSphere){
            _wr.headSphere.material.emissive = headColor;
            _wr.headSphere.material.emissiveIntensity = hasGlow ? 0.55 : 0.15;
          }
        }catch(e){}
      }
      // body segments
      for (var i = 0; i < W.segments; i++){
        _ensureBodySeg(E, i);
        var seg = _wr.bodyPool[i];
        if (!seg) continue;
        var pi = Math.min((i + 1) * 5, W.path.length - 1);
        var p = W.path[pi] || W.path[W.path.length - 1];
        if (!p) continue;
        var segY = 1.5 + Math.sin(t * 0.15 + (i + 1) * 0.6) * 0.18;
        seg.position.set(p.x, segY, p.z);
        // rainbow tint from diet
        var segHue = ((hue + (i + 1) * 0.05) % 1 + 1) % 1;
        seg.material.color.setHSL(segHue, 0.7, 0.68);
        if (seg._glow){ seg._glow.position.set(p.x, segY, p.z);
          if(seg._glow.material&&seg._glow.material.color) seg._glow.material.color.setHSL(segHue,0.85,0.7); }
      }
      // hide excess pool segments
      for (var j = W.segments; j < _wr.bodyPool.length; j++){
        try{ _wr.bodyPool[j].position.set(0, -100, 0); if(_wr.bodyPool[j]._glow) _wr.bodyPool[j]._glow.position.set(0,-100,0); }catch(e){}
      }
      try{ Bloom.fx.stepTrail(W, hue); }catch(e){}
    }catch(e){}
  }

  Bloom.startGame = function(){
    try{ Bloom.input.install(); }catch(e){}
    try{ Bloom.ui.install(); }catch(e){}
    try{ Bloom.audio.start(); }catch(e){}
    try{ Bloom.audio.setLayer(ST.tierIndex); }catch(e){}
    ST.phase = 'playing';
    var t0 = Bloom.tiers.get(ST.tierIndex);
    try{ Bloom.world.build(t0); }catch(e){}
    try{ Bloom.grazables.reset(t0); }catch(e){}
    try{ Bloom.ui.hideTitle(); }catch(e){}
  };

  Bloom.tick = function(forceInput){
    _wr.t++;
    var t = _wr.t;
    var input = (forceInput!=null)? forceInput : (Bloom.input.get? Bloom.input.get() : 0);
    if (ST.phase === 'blooming'){
      if (!Bloom.bloom.active()){ try{ Bloom.bloom.begin(ST); Bloom.audio.sfx('bloom'); }catch(e){} }
      try{ Bloom.bloom.update(ST, W); }catch(e){}
    } else if (ST.phase === 'playing'){
      Bloom.worm.step(W, input);
      var fam = (Bloom.grazables.checkEat? Bloom.grazables.checkEat(W.x, W.z, 1.9) : null);
      if (fam){ Bloom.self.applyGraze(ST.self, fam); Bloom.worm.grow(W);
        Bloom.state.graze(ST, 0.05); try{ Bloom.audio.sfx('graze'); }catch(e){}
        _wr.pop = 1; try{ Bloom.fx.spawnBurst(W.x, 1.5, W.z, Bloom.grazables._lastColor); }catch(e){} }
      try{ Bloom.world.stepCreatures(W.x, W.z); }catch(e){}
    }
    try{ Bloom.ui.setWonder(ST.wonder); }catch(e){}
    // render (guarded; no-op under tests)
    try{ var E=Bloom._engine; if(E.renderer && E.scene && E.camera){
      if (ST.phase !== 'blooming'){
        var bx=Math.sin(t*0.012)*1.4, by=Math.cos(t*0.016)*0.9;
        E.camera.position.lerp(new THREE.Vector3(W.x+bx, 27+by, W.z+32), 0.06);
        E.camera.lookAt(W.x, 1.0, W.z + 3);
      }
      if (ST.phase === 'playing'){ try{ Bloom.world.follow(W.x, W.z); }catch(e){} try{ Bloom.grazables.step(t); }catch(e){} }
      try{ Bloom.fx.stepAmbient(t, E.camera.position.x, E.camera.position.z); }catch(e){}
      _renderWorm(E, W, ST, t);
      E.renderer.render(E.scene, E.camera); } }catch(e){ if(!Bloom._re){ Bloom._re=1; showDebug('render: '+((e&&e.message)||e)); } }
  };

  // resize handler (guarded)
  try{
    window.addEventListener('resize', function(){
      try{
        var E = Bloom._engine;
        if (E.camera){ E.camera.aspect = window.innerWidth / window.innerHeight; E.camera.updateProjectionMatrix(); }
        if (E.renderer){ E.renderer.setSize(window.innerWidth, window.innerHeight); }
      }catch(e){}
    });
  }catch(e){}

  // Wire UI + input at LOAD so the Begin button works. (Previously Bloom.ui.install
  // ran ONLY inside startGame — which the button click was supposed to trigger — a
  // dead-button deadlock the stub tests missed because they call startGame directly.)
  try{ Bloom.input.install(); }catch(e){}
  try{ Bloom.ui.install(); }catch(e){}

  // browser rAF loop (no-op under the test stub's requestAnimationFrame)
  function frame(){ try{ Bloom.tick(); }catch(e){} window.requestAnimationFrame(frame); }
  try{ window.requestAnimationFrame(frame); }catch(e){}
  /* ===== END loop ===== */
})();
</script>
</body></html>
