<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ameame's Worm Adventure 🐛</title>
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#d6f0ff;
    font-family:'Comic Sans MS','Segoe UI',system-ui,cursive,sans-serif;touch-action:none;}
  #sky{position:fixed;inset:0;z-index:-1;
    background:linear-gradient(180deg,#ffd6f5 0%,#e3d9ff 35%,#d6f0ff 65%,#d9ffe3 100%);}
  canvas{display:block;}
  .hud{position:fixed;color:#7a4a6b;text-shadow:0 2px 0 #fff;user-select:none;-webkit-user-select:none;}
  #score{top:14px;left:18px;font-size:30px;font-weight:bold;}
  #best{top:54px;left:18px;font-size:15px;opacity:.85;}
  #toast{top:84px;left:50%;transform:translateX(-50%);font-size:26px;color:#ff5fa2;
    opacity:0;transition:opacity .35s;font-weight:bold;white-space:nowrap;}
  #reset{top:14px;right:18px;background:#ffb3d9;border:none;border-radius:22px;
    padding:9px 18px;font-size:16px;cursor:pointer;color:#7a4a6b;box-shadow:0 3px 0 #e48bbd;}
  #reset:active{transform:translateY(3px);box-shadow:0 0 0 #e48bbd;}
  #overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;background:rgba(255,255,255,.45);backdrop-filter:blur(4px);
    -webkit-backdrop-filter:blur(4px);text-align:center;padding:20px;box-sizing:border-box;}
  #overlay h1{font-size:min(11vw,60px);color:#ff5fa2;margin:0;line-height:1.05;
    text-shadow:0 4px 0 #fff,0 7px 12px rgba(0,0,0,.12);}
  #overlay .jp{font-size:26px;color:#5fb36a;margin:6px;}
  #overlay p{font-size:19px;color:#7a4a6b;max-width:540px;line-height:1.5;}
  #start{margin-top:14px;font-size:27px;padding:16px 44px;border:none;border-radius:32px;
    background:linear-gradient(180deg,#ffd66e,#ffac4d);color:#7a3b00;cursor:pointer;
    box-shadow:0 6px 0 #e08a2b;font-family:inherit;}
  #start:active{transform:translateY(4px);box-shadow:0 2px 0 #e08a2b;}
  .hint{font-size:14px;opacity:.75;margin-top:22px;max-width:480px;}
</style>
</head>
<body>
<div id="sky"></div>
<div id="score" class="hud">🍬 0</div>
<div id="best" class="hud"></div>
<div id="toast" class="hud"></div>
<button id="reset" class="hud">↻ restart</button>
<div id="overlay">
  <h1>Ameame's<br>Worm Adventure</h1>
  <div class="jp">あめあめの にょろにょろ</div>
  <p>Steer your wiggly worm with the <b>← →</b> arrow keys (or <b>A&nbsp;/&nbsp;D</b>, or tap left/right) and gobble the candy to grow! 🍓🍬🍭</p>
  <button id="start">▶ Start!</button>
  <div class="hint">There's no losing — just wiggle around and grow as long as you like 💕</div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script>
(function(){
  if (typeof THREE === 'undefined') {
    document.getElementById('overlay').innerHTML =
      '<h1>Oops! 🐛</h1><p>This game needs an internet connection the first time, to load its 3D engine. Please connect and re-open me 💕</p>';
    return;
  }

  // ---------- renderer / scene ----------
  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xe2f7ff, 70, 230);
  const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 600);
  camera.position.set(0, 26, 30);

  scene.add(new THREE.HemisphereLight(0xffffff, 0xffd6f5, 0.95));
  const sun = new THREE.DirectionalLight(0xffffff, 0.75); sun.position.set(20,40,15); scene.add(sun);
  scene.add(new THREE.AmbientLight(0xffffff, 0.35));

  // ---------- ground ----------
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(400, 56),
    new THREE.MeshStandardMaterial({color:0xc4f0cf, roughness:1})
  );
  ground.rotation.x = -Math.PI/2; scene.add(ground);
  const grid = new THREE.GridHelper(1200, 120, 0x9fd9b0, 0xd2eed8);
  grid.position.y = 0.02; scene.add(grid);

  // ---------- worm ----------
  const SEG_R = 1.4, GAP = 5, SPEED = 0.33, TURN = 0.058, BASE_Y = 1.45;
  let heading = 0, head = {x:0, z:0}, path = [{x:0,z:0}];
  const hsl = (i)=> new THREE.Color().setHSL(((0.02 + i*0.075) % 1), 0.72, 0.7);

  const headGroup = new THREE.Group(); scene.add(headGroup);
  headGroup.add(new THREE.Mesh(
    new THREE.SphereGeometry(SEG_R*1.18, 26, 26),
    new THREE.MeshStandardMaterial({color:0xff9ed1, roughness:0.5})
  ));
  function eye(side){
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.52,18,18), new THREE.MeshStandardMaterial({color:0xffffff})));
    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.27,12,12), new THREE.MeshStandardMaterial({color:0x2a2230}));
    pupil.position.z = 0.34; g.add(pupil);
    const shine = new THREE.Mesh(new THREE.SphereGeometry(0.09,8,8), new THREE.MeshBasicMaterial({color:0xffffff}));
    shine.position.set(0.12,0.14,0.48); g.add(shine);
    g.position.set(side*0.55, 0.55, SEG_R*0.92);
    return g;
  }
  headGroup.add(eye(-1)); headGroup.add(eye(1));
  function cheek(side){
    const m = new THREE.Mesh(new THREE.CircleGeometry(0.34,14),
      new THREE.MeshBasicMaterial({color:0xff8fb8, transparent:true, opacity:0.8}));
    m.position.set(side*0.92, -0.02, SEG_R*0.74); m.rotation.y = side*0.35; return m;
  }
  headGroup.add(cheek(-1)); headGroup.add(cheek(1));
  // little antennae
  function antenna(side){
    const g = new THREE.Group();
    const stalk = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.05,0.9,6), new THREE.MeshStandardMaterial({color:0xff7ab0}));
    stalk.position.y = 0.45; g.add(stalk);
    const ball = new THREE.Mesh(new THREE.SphereGeometry(0.2,12,12), new THREE.MeshStandardMaterial({color:0xfff07a, emissive:0x554400, emissiveIntensity:0.4}));
    ball.position.y = 0.95; g.add(ball);
    g.position.set(side*0.4, SEG_R*0.9, 0); g.rotation.z = side*0.3;
    return g;
  }
  headGroup.add(antenna(-1)); headGroup.add(antenna(1));

  let body = [];
  function addSeg(){
    const m = new THREE.Mesh(new THREE.SphereGeometry(SEG_R,22,22),
      new THREE.MeshStandardMaterial({color: hsl(body.length+1), roughness:0.5}));
    scene.add(m); body.push(m);
  }
  for (let i=0;i<4;i++) addSeg();

  // ---------- treats ----------
  const PALETTE = [0xff5ec4,0xffd54a,0x8ce06a,0x6ec6ff,0xb98cff,0xff8a5c];
  const treat = new THREE.Mesh(new THREE.SphereGeometry(1.15,20,20),
    new THREE.MeshStandardMaterial({color:0xff5ec4, roughness:0.25, emissive:0x331122, emissiveIntensity:0.25}));
  scene.add(treat);
  function spawnTreat(){
    const a = Math.random()*Math.PI*2, d = 16 + Math.random()*26;
    treat.position.set(head.x + Math.cos(a)*d, 1.3, head.z + Math.sin(a)*d);
    treat.material.color.setHex(PALETTE[(Math.random()*PALETTE.length)|0]);
  }
  spawnTreat();

  // ---------- sparkles ----------
  let sparks = [];
  function burst(pos, hex){
    for (let i=0;i<16;i++){
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.24,8,8),
        new THREE.MeshBasicMaterial({color: (i%3===0)?0xffffff:hex}));
      s.position.copy(pos);
      const a = Math.random()*Math.PI*2, sp = 0.3 + Math.random()*0.55;
      s.userData = {vx:Math.cos(a)*sp, vy:0.35+Math.random()*0.55, vz:Math.sin(a)*sp, life:1};
      scene.add(s); sparks.push(s);
    }
  }

  // ---------- input ----------
  let turn = 0, started = false;
  const LEFT = ['ArrowLeft','a','A'], RIGHT = ['ArrowRight','d','D'];
  addEventListener('keydown', e=>{ if(LEFT.includes(e.key)) turn=1; else if(RIGHT.includes(e.key)) turn=-1; });
  addEventListener('keyup',   e=>{ if(LEFT.includes(e.key)||RIGHT.includes(e.key)) turn=0; });
  renderer.domElement.addEventListener('pointerdown', e=>{ if(started) turn = (e.clientX < innerWidth/2)? 1 : -1; });
  addEventListener('pointerup', ()=> turn=0);

  // ---------- audio ----------
  let actx = null;
  function pop(freq){
    if(!actx) return;
    try{
      const o = actx.createOscillator(), g = actx.createGain();
      o.type='triangle'; o.frequency.value=freq; o.connect(g); g.connect(actx.destination);
      g.gain.setValueAtTime(0.0001, actx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.22, actx.currentTime+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime+0.18);
      o.start(); o.stop(actx.currentTime+0.2);
    }catch(e){}
  }

  // ---------- score / ui ----------
  let score = 0, toastT = 0;
  const scoreEl=document.getElementById('score'), bestEl=document.getElementById('best'), toastEl=document.getElementById('toast');
  function showBest(){ const b=+(localStorage.getItem('ameame_best')||0); bestEl.textContent = b? ('best 🏆 '+b):''; }
  showBest();
  function toast(msg){ toastEl.textContent=msg; toastEl.style.opacity=1; toastT=performance.now(); }
  function setScore(s){
    score=s; scoreEl.textContent='🍬 '+s;
    if(s>0 && s%5===0) toast('🎉 '+s+' candies! やったね！');
    if(s > +(localStorage.getItem('ameame_best')||0)){ localStorage.setItem('ameame_best', s); showBest(); }
  }
  function reset(){
    heading=0; head={x:0,z:0}; path=[{x:0,z:0}];
    body.forEach(m=>scene.remove(m)); body=[];
    for(let i=0;i<4;i++) addSeg();
    setScore(0); spawnTreat();
  }
  document.getElementById('reset').onclick = reset;
  document.getElementById('start').onclick = ()=>{
    document.getElementById('overlay').style.display='none';
    started = true;
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){}
  };

  addEventListener('resize', ()=>{
    camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  // ---------- loop ----------
  let t = 0;
  function animate(){
    requestAnimationFrame(animate);
    t++;
    if(started){
      heading += turn*TURN;
      head.x += Math.cos(heading)*SPEED;
      head.z += Math.sin(heading)*SPEED;
      path.unshift({x:head.x, z:head.z});
      const need = (body.length+2)*GAP + 6;
      while(path.length>need) path.pop();
      // keep ground under the worm so it never runs out of world
      ground.position.set(head.x, 0, head.z);
    }

    headGroup.position.set(head.x, BASE_Y + Math.sin(t*0.15)*0.12, head.z);
    headGroup.rotation.y = Math.PI/2 - heading;

    for(let i=0;i<body.length;i++){
      const p = path[Math.min((i+1)*GAP, path.length-1)] || path[path.length-1];
      body[i].position.set(p.x, BASE_Y + Math.sin(t*0.15 + (i+1)*0.6)*0.18, p.z);
    }

    if(Math.hypot(head.x-treat.position.x, head.z-treat.position.z) < SEG_R*1.7){
      setScore(score+1); addSeg(); burst(treat.position, treat.material.color.getHex());
      pop(520 + (score%12)*24); spawnTreat();
    }
    treat.position.y = 1.3 + Math.sin(t*0.08)*0.3; treat.rotation.y += 0.045;

    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i], u=s.userData;
      s.position.x+=u.vx; s.position.y+=u.vy; s.position.z+=u.vz; u.vy-=0.03; u.life-=0.025;
      s.scale.setScalar(Math.max(0.01,u.life));
      if(u.life<=0){ scene.remove(s); sparks.splice(i,1); }
    }

    camera.position.lerp(new THREE.Vector3(head.x, 26, head.z+30), 0.06);
    camera.lookAt(head.x, 0, head.z);

    if(performance.now()-toastT > 1500) toastEl.style.opacity=0;
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
